# Kamal config para katana.bloqs.cl — convive en el mismo VPS que
# bloqs.cl, memoriaqr.cl, lozarate y agentesgpt (kamal-proxy enruta
# por dominio). Un solo contenedor Node sirve el juego y el WebSocket
# de emparejamiento (~40 MB de RAM).

service: katana
image: arigatodon/katana-fight

servers:
  web:
    - 72.60.156.215

proxy:
  ssl: true
  host: katana.bloqs.cl
  app_port: 8081
  healthcheck:
    path: /up
    interval: 5

registry:
  username: arigatodon
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

aliases:
  logs: app logs -f
  shell: app exec --interactive --reuse "sh"
