            color: #9a9486; text-decoration: none; font-size: 13px; opacity: .6; }
  #volver:hover { opacity: 1; color: #e8c050; }
  #fs { position: fixed; top: 6px; right: 8px; z-index: 10;
        background: rgba(20,20,28,0.55); border: 1px solid #6a6458; border-radius: 6px;
        color: #c0b8a8; font-size: 20px; line-height: 1; padding: 6px 9px; cursor: pointer;
        opacity: .7; -webkit-user-select: none; user-select: none; }
  #fs:hover { opacity: 1; color: #e8c050; border-color: #e8c050; }
  /* en pantalla completa el botón ya no hace falta verse tan marcado */
  :fullscreen #fs, :-webkit-full-screen #fs { opacity: .35; }
  #rotate { display: none; position: fixed; inset: 0; z-index: 20;
            background: #0c0a0c; color: #e8e0d0; align-items: center;
            justify-content: center; text-align: center; font-size: 22px; line-height: 1.8; }
  @media (orientation: portrait) and (pointer: coarse) { #rotate { display: flex; } }
  #bmName { display: none; position: absolute; left: 50%; top: 60%;
            transform: translate(-50%, -50%); width: 60%; max-width: 380px;
            padding: 9px 14px; background: rgba(10,10,18,0.92); border: 2px solid #e8c050;
            color: #fff; font-family: "Courier New", monospace; font-size: 22px; font-weight: bold;
            text-align: center; text-transform: uppercase; letter-spacing: 2px; outline: none; }
</style>

<script>
// Pantalla completa: funciona en Android, iPad y escritorio (API Fullscreen).
// En iPhone Safari la API no existe para juegos → ahí el botón no hace nada,
// pero "Compartir → Añadir a inicio" abre el juego a pantalla completa gracias
// a las metaetiquetas apple-mobile-web-app-*.
(function () {
  var btn = document.getElementById('fs');
  if (!btn) return;
  var root = document.documentElement;
  function fsEl() { return document.fullscreenElement || document.webkitFullscreenElement; }
  function soportado() {
    return !!(root.requestFullscreen || root.webkitRequestFullscreen || document.documentElement.webkitRequestFullScreen);
  }
  if (!soportado()) { btn.style.display = 'none'; return; }   // p. ej. iPhone: lo ocultamos
  function toggle() {
    if (!fsEl()) {
      var req = root.requestFullscreen || root.webkitRequestFullscreen;
      try {
        var pr = req.call(root);
        if (pr && pr.then) pr.then(bloquearOrientacion).catch(function () {});
        else bloquearOrientacion();
      } catch (e) {}
    } else {
      try { (document.exitFullscreen || document.webkitExitFullscreen).call(document); } catch (e) {}
    }
  }
  function bloquearOrientacion() {
    try { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(function () {}); } catch (e) {}
  }
  btn.addEventListener('click', toggle);
  function actualizarIcono() { btn.textContent = fsEl() ? '🗗' : '⛶'; }
  document.addEventListener('fullscreenchange', actualizarIcono);
  document.addEventListener('webkitfullscreenchange', actualizarIcono);
})();
</script>
