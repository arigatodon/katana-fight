<title>KATANA RŌNIN — beat 'em up</title>
<style>
  html, body { margin: 0; height: 100%; background: #0c0a0c; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center;
         font-family: "Courier New", monospace; }
  #wrap { position: relative; }
  canvas { display: block; image-rendering: auto; background: #1a1418;
           box-shadow: 0 0 60px rgba(0,0,0,0.8);
           width: min(100vw, calc(100vh * 16 / 9));
           height: min(100vh, calc(100vw * 9 / 16));
           touch-action: none; -webkit-user-select: none; user-select: none; }
  #volver { position: fixed; top: 8px; left: 10px; z-index: 10;
            color: #9a9486; text-decoration: none; font-size: 13px; opacity: .6; }
  #volver:hover { opacity: 1; color: #e8c050; }
  #rotate { display: none; position: fixed; inset: 0; z-index: 20;
            background: #0c0a0c; color: #e8e0d0; align-items: center;
            justify-content: center; text-align: center; font-size: 22px; line-height: 1.8; }
  @media (orientation: portrait) and (pointer: coarse) { #rotate { display: flex; } }
  #bmName { display: none; position: absolute; left: 50%; top: 60%;
            transform: translate(-50%, -50%); width: 60%; max-width: 380px;
            padding: 9px 14px; background: rgba(10,10,18,0.92); border: 2px solid #e8c050;
            color: #fff; font-family: "Courier New", monospace; font-size: 22px; font-weight: bold;
            text-align: center; text-transform: uppercase; letter-spacing: 2px; outline: none; }
</style>
