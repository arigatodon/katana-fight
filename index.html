<script>

const SAVE_KEY = 'katana_fight_save_v1';
function loadSave() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (s && s.rep) return s;
  } catch (e) {}
  return {
    totalWins: 0, streak: 0, bestStreak: 0,
    rep: { honor: 0, astucia: 0, ferocidad: 0, disciplina: 0 },
    ranking: [],            // { firma, score, char, fecha, racha, titulo }

}

// ---------------- Audio (sintetizado, sin archivos) ----------------
const AC = window.AudioContext || window.webkitAudioContext;
let audio = null;
function initAudio() { if (!audio && AC) audio = new AC(); if (audio && audio.state === 'suspended') audio.resume(); }

function noiseBuffer(dur) {
  const len = Math.floor(audio.sampleRate * dur);
  const buf = audio.createBuffer(1, len, audio.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function noiseHit(dur, type, f0, f1, vol) {
  if (!audio) return;
  const t = audio.currentTime;
  const src = audio.createBufferSource();
  src.buffer = noiseBuffer(dur);
  const f = audio.createBiquadFilter();
  f.type = type;
  f.frequency.setValueAtTime(f0, t);
  if (f1) f.frequency.exponentialRampToValueAtTime(f1, t + dur * 0.6);
  const g = audio.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(audio.destination);
  src.start(t);
}
function tone(type, f0, f1, dur, vol) {
  if (!audio) return;
  const t = audio.currentTime;
  const o = audio.createOscillator();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1) o.frequency.exponentialRampToValueAtTime(f1, t + dur);
  const g = audio.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(audio.destination);
  o.start(t); o.stop(t + dur + 0.05);
}
function sfxSlash()  { noiseHit(0.22, 'bandpass', 800, 4500, 0.45); }
function sfxFeint()  { noiseHit(0.14, 'bandpass', 500, 1800, 0.2); }
function sfxJump()   { noiseHit(0.12, 'bandpass', 300, 900, 0.12); }
function sfxHit()    { noiseHit(0.18, 'lowpass', 700, 0, 0.5); tone('sawtooth', 160, 70, 0.2, 0.25); }
function sfxBlock()  { noiseHit(0.1, 'highpass', 3500, 0, 0.25); tone('square', 1800, 1200, 0.12, 0.12); }
function sfxBreak()  { noiseHit(0.35, 'lowpass', 1200, 200, 0.5); tone('square', 320, 60, 0.4, 0.3); }
function sfxBell()   { tone('sine', 440, 438, 1.6, 0.18); tone('sine', 660, 657, 1.3, 0.08); }
function sfxParry() {
  if (!audio) return;
  [2400, 3170, 4080].forEach((fr, i) => tone('square', fr, fr * 0.98, 0.4, 0.1 / (i + 1)));
  noiseHit(0.08, 'highpass', 5000, 0, 0.3);
  tone('sine', 1320, 1318, 0.5, 0.15);
}
function sfxClash() {
  if (!audio) return;
  [2400, 3170, 4080, 5300].forEach((fr, i) => tone('square', fr * (1 + Math.random() * 0.02), fr, 0.35, 0.12 / (i + 1)));
  noiseHit(0.1, 'highpass', 5000, 0, 0.3);
}
function sfxKill() {
  tone('sawtooth', 220, 40, 0.65, 0.35);
  noiseHit(0.4, 'lowpass', 900, 0, 0.4);
}
function sfxSelect() { tone('square', 700, 1050, 0.08, 0.1); }
function sfxConfirm() { tone('square', 520, 1040, 0.18, 0.14); }
function sfxThunder() { noiseHit(0.5, 'lowpass', 400, 80, 0.4); tone('sawtooth', 90, 35, 0.5, 0.2); }

  for (const rg of RASGOS) { acc += rg.prob; if (r < acc) return rg; }

<script>
// ============================================================
//  ENTRADA
// ============================================================
const keys = {};
window.addEventListener('keydown', e => {
  initAudio();
  if (!e.repeat) keyPressQueue.push(e.code);
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
let keyPressQueue = [];   // pulsaciones discretas para los menús

const TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchState = { left: false, right: false, jump: false, attack: false, feint: false };
let tapQueue = [];        // toques discretos (para menús)

const TBTN = [
  { id: 'left',   x: 85,      y: H - 65,  r: 46, label: '◀' },
  { id: 'right',  x: 200,     y: H - 65,  r: 46, label: '▶' },
  { id: 'jump',   x: 142,     y: H - 168, r: 36, label: '▲' },
  { id: 'attack', x: W - 85,  y: H - 75,  r: 52, label: '斬' },
  { id: 'feint',  x: W - 205, y: H - 58,  r: 42, label: '謀' },
];

function canvasPos(t) {
  const r = cvs.getBoundingClientRect();
  return { x: (t.clientX - r.left) * (W / r.width), y: (t.clientY - r.top) * (H / r.height) };
}
function updateTouches(e) {
  e.preventDefault();
  initAudio();
  for (const k in touchState) touchState[k] = false;
  for (const t of e.touches) {
    const p = canvasPos(t);
    for (const b of TBTN) {
      if (Math.hypot(p.x - b.x, p.y - b.y) < b.r + 14) touchState[b.id] = true;
    }
  }
}
cvs.addEventListener('touchstart', e => {
  updateTouches(e);
  for (const t of e.changedTouches) tapQueue.push(canvasPos(t));
}, { passive: false });
cvs.addEventListener('touchmove', updateTouches, { passive: false });
cvs.addEventListener('touchend', updateTouches, { passive: false });
cvs.addEventListener('touchcancel', updateTouches, { passive: false });
cvs.addEventListener('mousedown', e => {
  initAudio();
  tapQueue.push(canvasPos(e));
});

// ============================================================
//  ESTADO GLOBAL
// ============================================================
// Escenas: title | charSelect | virtud | destino | apuesta | fight |
//          roundEnd | matchEnd | firma | ranking
let scene = 'title';
let menuSel = 0;
let vsCPU = true;
let modoFinal = false;          // modo Golpe Final: un corte decide
let p1 = null, p2 = null;
let stage = STAGES[0];
let destino = DESTINOS[0];
let timeScale = 1;
let slowmoTimer = 0;
let shake = 0;
let flashTimer = 0;             // destello blanco (parry / ejecución)
let roundMsg = '', roundMsgSub = '', roundMsgTimer = 0;
let roundStartTimer = 0;
let roundNum = 0;
let matchWinner = null;
let particles = [];
let slashTrails = [];
let floaters = [];              // textos flotantes (¡PARRY!, daño…)
let projectiles = [];           // mercado
let cracks = [];                // volcán
let bellTimer = 0;              // templo
let darkPulse = 0;              // oscuridad
let lastTime = 0;
let gTime = 0;                  // reloj global para animaciones de UI

// selección de personaje
let selP = 0;                   // 0: elige P1 · 1: elige P2
let selIdx = [0, 0];
// virtud
let virtudOpts = [];
let virtudSel = 0;
// apuesta
let betSel = [0, 0];
let betDone = [false, false];
let betReveal = 0;
// firma arcade
let firmaChars = ['A', 'A', 'A'];
let firmaPos = 0;
let pendingScore = null;

// Fantasmas del Pasado: repetición del ganador de la ronda anterior
let ghostRec = null;            // grabación en curso { owner, frames }
let ghostPlay = null;           // reproducción { frames, i, pal }

// ============================================================
//  JUGADOR
// ============================================================
const PSTATE = {
  IDLE: 0, WINDUP: 1, ATTACK: 2, RECOVER: 3,
  FEINT: 4, GUARD: 5, STAGGER: 6, HITSTUN: 7,
  EXPOSED: 8, DEAD: 9,
};

function makePlayer(x, facing, char, isCPU, name, virtud) {
  const p = {
    x, y: GROUND, vx: 0, vy: 0, facing,
    char, pal: char.pal, name,
    state: PSTATE.IDLE, stateTimer: 0,
    vida: VIDA_MAX, postura: 0,
    wins: 0, isCPU,
    onGround: true, jumpsUsed: 0,
    deathT: 0, guardT: 0, exposedFlash: 0,
    bet: null, virtud: virtud || null,
    rasgo: rollRasgo(),
    instintoUsed: false,
    // estadísticas del combate (reputación / puntaje)
    stats: { feints: 0, blocks: 0, parries: 0, hits: 0, taken: 0, perfects: 0 },
    // IA
    aiTimer: 0, aiAction: 'approach', aiReact: 0,
    bob: Math.random() * 10,
    attackHeld: false, feintHeld: false, jumpHeld: false,
    afterimages: [],
  };
  deriveAttrs(p);
  p.postura = p.posMax;
  return p;
}

// Convierte las estadísticas ocultas + virtud + apuesta en valores jugables
function deriveAttrs(p) {
  const s = Object.assign({}, p.char.stats);
  if (p.virtud && p.virtud.mod) for (const k in p.virtud.mod) s[k] = (s[k] || 0) + p.virtud.mod[k];
  if (p.rasgo && p.rasgo.id === 'cuervo') s.postura += 10;
  p.st = s;

  const betSpd = p.bet === 'agresivo' ? 1.15 : p.bet === 'prudente' ? 0.92 : 1;
  p.speed    = (175 + s.agilidad * 4.5) * betSpd;
  p.jumpVel  = -(430 + s.agilidad * 6.5) * (p.char.jumpMul || 1);
  p.windup   = Math.max(0.10, 0.27 - s.corte * 0.004) * (p.char.windupMul || 1) * (p.bet === 'agresivo' ? 0.82 : 1);
  p.recover  = Math.max(0.15, 0.42 - s.corte * 0.005);
  p.dmg      = (22 + s.corte * 0.9) * (p.char.dmgMul || 1);
  p.posMax   = (55 + s.postura * 2.4) * (p.bet === 'prudente' ? 1.35 : p.bet === 'desesperado' ? 0.55 : 1);
  p.posRegen = (6 + s.postura * 0.35) * (p.virtud && p.virtud.id === 'serena' ? 1.7 : 1);
  p.parryWin = (0.08 + s.reflejos * 0.0045) * (p.char.parryMul || 1);
  p.feintTime  = Math.max(0.08, 0.20 - s.engano * 0.003);
  p.feintRec   = Math.max(0.04, 0.18 - s.engano * 0.004);
  p.feintDrain = (9 + s.engano * 0.7) * (p.virtud && p.virtud.id === 'actor' ? 1.5 : 1);
  p.exposedDur = Math.max(0.7, 1.9 - s.espiritu * 0.022) * (p.virtud && p.virtud.id === 'serena' ? 0.75 : 1);
  p.staggerMul = Math.max(0.6, 1 - s.espiritu * 0.008);
  p.reach    = 86 * (p.char.reachMul || 1) * Math.max(1, p.char.scale || 1);
  p.scale    = p.char.scale || 1;
}

function bodyCenterY(p) { return p.y - 46 * p.scale; }
function oneHitMode() { return modoFinal || destino.id === 'sangre'; }

// ---------------- Flujo de combate ----------------
function startMatch() {
  stage = STAGES[Math.floor(Math.random() * STAGES.length)];
  const c1 = allChars()[selIdx[0]], c2 = allChars()[selIdx[1]];
  const v1 = virtudOpts[virtudSel] || null;
  p1 = makePlayer(W * 0.25, 1, c1, false, 'JUGADOR 1', v1);
  p2 = makePlayer(W * 0.75, -1, c2, vsCPU, vsCPU ? 'CPU' : 'JUGADOR 2',
                  VIRTUDES[Math.floor(Math.random() * VIRTUDES.length)]);
  roundNum = 0;
  matchWinner = null;
  ghostRec = null; ghostPlay = null;
  startRoundFlow();
}

function startRoundFlow() {
  roundNum++;
  destino = roundNum === 1 && Math.random() < 0.35
    ? DESTINOS[0]
    : DESTINOS[Math.floor(Math.random() * DESTINOS.length)];
  scene = 'destino';
  roundMsgTimer = 2.2;
  betSel = [0, 0];
  betDone = [false, !vsCPU ? false : true];
  if (vsCPU) betSel[1] = Math.floor(Math.random() * 3);
  betReveal = 0;
}

function resetRound() {
  // conserva victorias/virtud/rasgo, restaura cuerpos
  for (const [p, x, f] of [[p1, W * 0.25, 1], [p2, W * 0.75, -1]]) {
    p.x = x; p.y = GROUND; p.vx = 0; p.vy = 0; p.facing = f;
    p.state = PSTATE.IDLE; p.stateTimer = 0;
    p.vida = VIDA_MAX;
    p.bet = APUESTAS[betSel[p === p1 ? 0 : 1]].id;
    deriveAttrs(p);
    p.postura = p.posMax;
    p.onGround = true; p.jumpsUsed = 0; p.deathT = 0;
    p.desespUsed = false;
    p.afterimages = [];
  }
  particles = []; slashTrails = []; floaters = []; projectiles = [];
  cracks = []; bellTimer = 3 + Math.random() * 4;
  if (stage.id === 'volcan') spawnCracks();
  timeScale = 1; slowmoTimer = 0; shake = 0; flashTimer = 0;
  roundStartTimer = 2.2;
  // fantasma: reproduce la grabación de la ronda anterior
  if (ghostRec && ghostRec.frames.length > 20) {
    ghostPlay = { frames: ghostRec.frames, i: 0, pal: ghostRec.pal, t: 0 };
  } else ghostPlay = null;
  ghostRec = { frames: [], pal: null };
  scene = 'fight';
}

function spawnCracks() {
  cracks = [];
  const n = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < n; i++) {
    cracks.push({ x: W * (0.2 + Math.random() * 0.6), w: 50 + Math.random() * 40, heat: 0, phase: Math.random() * 10 });
  }
}
// ============================================================
//  PARTÍCULAS Y EFECTOS
// ============================================================
function spawnParticles(x, y, n, colors, speed, life) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.7);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - speed * 0.3,
      life: life * (0.5 + Math.random() * 0.5), maxLife: life,
      color: colors[Math.floor(Math.random() * colors.length)],
      size: 2 + Math.random() * 3, gravity: true,
    });
  }
}
function spawnSparks(x, y) {
  for (let i = 0; i < 22; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 150 + Math.random() * 450;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 0.15 + Math.random() * 0.25, maxLife: 0.4,
      color: ['#fff', '#ffe080', '#ffb030'][Math.floor(Math.random() * 3)],
      size: 1.5 + Math.random() * 2, gravity: false,
    });
  }
}
function floatText(x, y, txt, color, size) {
  floaters.push({ x, y, txt, color, size: size || 16, life: 0.9, maxLife: 0.9 });
}

const petals = [];
for (let i = 0; i < 26; i++) {
  petals.push({
    x: Math.random() * W, y: Math.random() * H,
    sway: Math.random() * Math.PI * 2,
    speed: 14 + Math.random() * 28,
    size: 2 + Math.random() * 3,
  });
}
const rain = [];
for (let i = 0; i < 80; i++) rain.push({ x: Math.random() * W, y: Math.random() * H, s: 400 + Math.random() * 300 });

// ============================================================
//  ACCIONES DE COMBATE
// ============================================================
function canAct(p) { return p.state === PSTATE.IDLE && roundStartTimer <= 0; }
function isVulnerable(p) { return p.state !== PSTATE.DEAD; }

function startAttack(p) {
  if (!canAct(p)) return;
  p.state = PSTATE.WINDUP;
  p.stateTimer = p.windup;
}

function startFeint(p) {
  if (!canAct(p) || destino.id === 'honor') return;
  p.state = PSTATE.FEINT;
  p.stateTimer = p.feintTime;
  p.stats.feints++;
  sfxFeint();
  if (p.char.afterimage) {
    p.afterimages.push({ x: p.x, y: p.y, facing: p.facing, life: 1.4, maxLife: 1.4, bob: p.bob });
  }
}

function startGuard(p) {
  if (!canAct(p)) return;
  p.state = PSTATE.GUARD;
  p.guardT = 0;
}

function doJump(p) {
  if (p.char.slide) {
    // Tiburón de Tierra: el salto es un deslizamiento veloz
    if (!canAct(p) || !p.onGround) return;
    p.vx = p.facing * 640;
    p.slideT = 0.22;
    sfxJump();
    for (let i = 0; i < 8; i++) {
      particles.push({
        x: p.x - p.facing * i * 6, y: GROUND - 6,
        vx: -p.facing * 60, vy: -30 - Math.random() * 40,
        life: 0.3, maxLife: 0.3, color: 'rgba(180,150,110,0.6)',
        size: 3 + Math.random() * 3, gravity: false,
      });
    }
    return;
  }
  const maxJumps = p.char.doubleJump ? 2 : 1;
  if (p.onGround) p.jumpsUsed = 0;
  if (p.jumpsUsed >= maxJumps) return;
  if (!p.onGround && !p.char.doubleJump) return;
  let jv = p.jumpVel;
  if (destino.id === 'lluvia') jv *= 0.7;
  p.vy = jv;
  p.onGround = false;
  p.jumpsUsed++;
  sfxJump();
}

function applyDamage(def, att, dmgRaw) {
  // ¿desesperado? primer golpe del que apostó mata
  let lethal = oneHitMode();
  if (att.bet === 'desesperado' && !att.desespUsed) { lethal = true; att.desespUsed = true; }

  let dmg = dmgRaw * (def.bet === 'desesperado' ? 1.8 : 1);
  if (def.rasgo && def.rasgo.id === 'sed' && def.vida < 35) dmg *= 0.6;
  if (def.state === PSTATE.EXPOSED) lethal = true;   // ejecución automática

  if (lethal || def.vida - dmg <= 0) {
    // Instinto: sobrevive una vez a un golpe letal
    if (def.virtud && def.virtud.id === 'instinto' && !def.instintoUsed) {
      def.instintoUsed = true;
      def.vida = 1;
      def.state = PSTATE.HITSTUN;
      def.stateTimer = 0.4;
      def.vx = att.facing * 420; def.vy = -200;
      flashTimer = 0.25;
      floatText(def.x, bodyCenterY(def) - 40, '¡INSTINTO!', '#80e8ff', 20);
      sfxThunder();
      return;
    }
    kill(def, att, def.state === PSTATE.EXPOSED);
    return;
  }
  def.vida -= dmg;
  def.postura = Math.max(0, def.postura - dmg * 0.35);
  def.state = PSTATE.HITSTUN;
  def.stateTimer = 0.32;
  def.vx = att.facing * 330;
  def.vy = -140;
  att.stats.hits++;
  def.stats.taken += dmg;
  if (att.char.steal) {
    const robo = Math.min(def.postura, 14);
    def.postura -= robo;
    att.postura = Math.min(att.posMax, att.postura + robo);
    floatText(att.x, bodyCenterY(att) - 36, '+postura', '#e8a030', 13);
  }
  sfxHit();
  shake = 9;
  spawnParticles(def.x, bodyCenterY(def), 16, ['#c01818', '#901010', '#e03030'], 260, 0.8);
  floatText(def.x, bodyCenterY(def) - 42, '-' + Math.round(dmg), '#ff6050', 18);
  checkPostureBreak(def);
}

function checkPostureBreak(p) {
  if (p.postura > 0 || p.state === PSTATE.DEAD || p.state === PSTATE.EXPOSED) return;
  p.state = PSTATE.EXPOSED;
  p.stateTimer = p.exposedDur;
  p.vx = 0;
  sfxBreak();
  shake = 12;
  floatText(p.x, bodyCenterY(p) - 56, '¡POSTURA ROTA!', '#ffd040', 20);
  spawnSparks(p.x, bodyCenterY(p));
}

function kill(victim, killer, ejecucion) {
  if (victim.state === PSTATE.DEAD) return;
  victim.state = PSTATE.DEAD;
  victim.stateTimer = 0;
  victim.vida = 0;
  victim.vx = killer.facing * 320;
  victim.vy = -260;
  killer.wins++;
  if (killer.vida >= VIDA_MAX) killer.stats.perfects++;
  sfxKill();
  shake = 18;
  timeScale = 0.15;
  slowmoTimer = 1.0;
  flashTimer = 0.12;
  spawnParticles(victim.x, bodyCenterY(victim), 50, ['#c01818', '#901010', '#e03030'], 380, 1.2);
  slashTrails.push({
    x1: victim.x - killer.facing * 70, y1: bodyCenterY(victim) - 50,
    x2: victim.x + killer.facing * 70, y2: bodyCenterY(victim) + 40,
    life: 0.8, maxLife: 0.8,
  });
  endRound(killer, ejecucion ? '¡EJECUCIÓN!' : '¡CORTE LIMPIO!');
}

function fallDeath(victim) {
  // puente: caer implica derrota
  if (victim.state === PSTATE.DEAD) return;
  const killer = victim === p1 ? p2 : p1;
  victim.state = PSTATE.DEAD;
  victim.vida = 0;
  killer.wins++;
  sfxKill();
  shake = 10;
  endRound(killer, '¡AL VACÍO!');
}

function endRound(winner, msg) {
  // guarda la grabación del ganador como fantasma de la próxima ronda
  if (ghostRec && ghostRec.frames.length > 20) snapshotGhostFor(winner);
  else ghostRec = null;
  if (winner.wins >= WIN_ROUNDS) matchWinner = winner;
  scene = 'roundEnd';
  roundMsg = msg;
  roundMsgSub = winner.name + ' gana la ronda';
  roundMsgTimer = matchWinner ? 2.6 : 2.1;
}

// ---------------- Resolución de golpes ----------------
function tryHit(att, def) {
  if (att.state !== PSTATE.ATTACK || !isVulnerable(def)) return;
  if (att.hitDone) return;
  const dist = Math.abs(att.x - def.x);
  const facingTarget = (def.x - att.x) * att.facing > 0;
  if (!facingTarget) return;
  const heightDiff = Math.abs(bodyCenterY(att) - bodyCenterY(def));
  if (dist > att.reach + 16 || heightDiff > 58 * Math.max(att.scale, def.scale)) return;
  att.hitDone = true;

  // ¿el defensor bloquea de frente?
  const defFacing = (att.x - def.x) * def.facing > 0;
  if (def.state === PSTATE.GUARD && defFacing && def.state !== PSTATE.EXPOSED) {
    if (def.guardT <= def.parryWin) {
      // ¡PARRY! el atacante queda tambaleando
      att.state = PSTATE.STAGGER;
      att.stateTimer = 0.85 * att.staggerMul;
      att.vx = -att.facing * 300;
      def.postura = Math.min(def.posMax, def.postura + 12);
      def.stats.parries++;
      sfxParry();
      flashTimer = 0.15;
      timeScale = 0.3; slowmoTimer = 0.22;
      shake = 8;
      spawnSparks((att.x + def.x) / 2, bodyCenterY(def) - 8);
      floatText(def.x, bodyCenterY(def) - 52, '¡PARRY!', '#80e8ff', 22);
    } else {
      // bloqueo normal: sin daño, pierde postura
      const breakMul = att.char.breakMul || 1;
      def.postura -= att.dmg * 0.65 * breakMul;
      def.stats.blocks++;
      def.vx = att.facing * 200;
      sfxBlock();
      shake = 5;
      spawnSparks((att.x + def.x) / 2, bodyCenterY(def) - 8);
      if (att.char.steal) {
        const robo = Math.min(Math.max(0, def.postura), 8);
        def.postura -= robo;
        att.postura = Math.min(att.posMax, att.postura + robo);
      }
      checkPostureBreak(def);
    }
    return;
  }
  applyDamage(def, att, att.dmg);
}

function updateCombat() {
  const dist = Math.abs(p1.x - p2.x);
  // choque de aceros: ambos atacando de frente
  const bothSwing =
    (p1.state === PSTATE.ATTACK || p1.state === PSTATE.WINDUP) &&
    (p2.state === PSTATE.ATTACK || p2.state === PSTATE.WINDUP);
  const facingEachOther = p1.x < p2.x ? (p1.facing === 1 && p2.facing === -1) : (p1.facing === -1 && p2.facing === 1);
  if (bothSwing && facingEachOther && dist < Math.max(p1.reach, p2.reach) * 1.6 &&
      (p1.state === PSTATE.ATTACK || p2.state === PSTATE.ATTACK)) {
    sfxClash();
    spawnSparks((p1.x + p2.x) / 2, (bodyCenterY(p1) + bodyCenterY(p2)) / 2 - 6);
    shake = 10; timeScale = 0.35; slowmoTimer = 0.18;
    for (const p of [p1, p2]) {
      p.state = PSTATE.STAGGER;
      p.stateTimer = 0.32 * p.staggerMul;
      p.vx = (p.x < (p === p1 ? p2 : p1).x ? -1 : 1) * 360;
      p.vy = -120;
    }
    return;
  }
  tryHit(p1, p2);
  tryHit(p2, p1);
}

// reacción a la finta: si el rival mordió el anzuelo (guardia o ataque), pierde postura
function resolveFeint(f, foe) {
  if (scene !== 'fight' || !foe || foe.state === PSTATE.DEAD) return;
  const d = Math.abs(f.x - foe.x);
  if (d < f.reach * 1.8 && (foe.state === PSTATE.GUARD || foe.state === PSTATE.WINDUP)) {
    foe.postura = Math.max(0, foe.postura - f.feintDrain);
    floatText(foe.x, bodyCenterY(foe) - 40, '¡ENGAÑADO!', '#d080e0', 16);
    sfxFeint();
    checkPostureBreak(foe);
  }
}
// ============================================================
//  IA
// ============================================================
function updateAI(p, foe, dt) {
  const out = { left: false, right: false, jump: false, attack: false, feint: false, guard: false };
  if (p.state === PSTATE.DEAD || roundStartTimer > 0) return out;
  const dist = Math.abs(p.x - foe.x);
  const dirToFoe = foe.x > p.x ? 1 : -1;
  const agresiva = p.bet === 'agresivo' || p.bet === 'desesperado';

  // reacción al windup del rival: bloquear, saltar o contraatacar
  if (foe.state === PSTATE.WINDUP && dist < p.reach * 1.7 && p.aiReact <= 0) {
    p.aiReact = 0.45;
    const roll = Math.random();
    const refl = p.st.reflejos / 40;
    if (roll < 0.30 + refl * 0.35) {
      p.aiGuardHold = 0.25 + Math.random() * 0.3;     // intenta bloquear / parry
    } else if (roll < 0.62) {
      out.jump = true;                                 // esquiva saltando
    } else if (roll < 0.85) {
      out.attack = true;                               // apuesta por el clash
    }
    // si no: se come el corte — la CPU no es perfecta
  }
  p.aiReact -= dt;

  // mantiene la guardia un instante si decidió bloquear
  if (p.aiGuardHold > 0) {
    p.aiGuardHold -= dt;
    out.guard = true;
    return out;
  }

  // rival expuesto: ¡a ejecutar!
  if (foe.state === PSTATE.EXPOSED) {
    if (dist < p.reach * 0.95) { out.attack = true; return out; }
    if (dirToFoe > 0) out.right = true; else out.left = true;
    return out;
  }

  p.aiTimer -= dt;
  if (p.aiTimer <= 0) {
    p.aiTimer = 0.22 + Math.random() * 0.45;
    const r = Math.random();
    const engano = p.st.engano / 40;
    if (dist > p.reach * 1.6) {
      p.aiAction = r < (agresiva ? 0.85 : 0.7) ? 'approach' : (r < 0.9 ? 'wait' : 'retreat');
    } else if (dist > p.reach * 0.9) {
      if (r < 0.30 + (agresiva ? 0.15 : 0)) p.aiAction = 'strike';
      else if (r < 0.45 + engano * 0.3 && destino.id !== 'honor') p.aiAction = 'feint';
      else if (r < 0.65) p.aiAction = 'approach';
      else if (r < 0.85) p.aiAction = 'retreat';
      else p.aiAction = 'guard';
    } else {
      p.aiAction = r < 0.55 ? 'strike' : (r < 0.75 ? 'retreat' : 'feint');
    }
    // postura baja: retrocede y recupera
    if (p.postura < p.posMax * 0.25 && Math.random() < 0.6) p.aiAction = 'retreat';
    // volcán: no te quedes sobre una grieta
    if (stage.id === 'volcan') {
      for (const c of cracks) {
        if (Math.abs(p.x - c.x) < c.w * 0.6 && c.heat > 0.5) p.aiAction = dirToFoe > 0 ? 'approach' : 'retreat';
      }
    }
    // puente: no retrocedas hacia el borde
    if (stage.id === 'puente' && p.aiAction === 'retreat') {
      const nx = p.x - dirToFoe * 40;
      if (nx < W * 0.16 || nx > W * 0.84) p.aiAction = 'guard';
    }
  }

  switch (p.aiAction) {
    case 'approach': if (dirToFoe > 0) out.right = true; else out.left = true; break;
    case 'retreat':  if (dirToFoe > 0) out.left = true; else out.right = true; break;
    case 'strike':
      if (dist < p.reach * 1.05) { out.attack = true; p.aiAction = 'wait'; }
      else { if (dirToFoe > 0) out.right = true; else out.left = true; }
      break;
    case 'feint':
      if (dist < p.reach * 1.5) { out.feint = true; p.aiAction = 'wait'; }
      else { if (dirToFoe > 0) out.right = true; else out.left = true; }
      break;
    case 'guard': out.guard = true; break;
    case 'wait': break;
  }
  return out;
}

// ============================================================
//  ENTRADA POR JUGADOR
// ============================================================
function readInput(p, isP1, foe, dt) {
  if (p.isCPU) return updateAI(p, foe, dt);
  if (isP1) {
    return {
      left:   keys['KeyA'] || touchState.left,
      right:  keys['KeyD'] || touchState.right,
      jump:   keys['KeyW'] || keys['Space'] || touchState.jump,
      attack: keys['KeyF'] || touchState.attack,
      feint:  keys['KeyG'] || touchState.feint,
      guard:  false,
    };
  }
  return {
    left: keys['ArrowLeft'], right: keys['ArrowRight'],
    jump: keys['ArrowUp'],
    attack: keys['KeyK'],
    feint: keys['KeyL'],
    guard: false,
  };
}

// ============================================================
//  ACTUALIZACIÓN DEL JUGADOR
// ============================================================
function updatePlayer(p, foe, isP1, dt) {
  const inp = readInput(p, isP1, foe, dt);
  // finta: toque corto (se dispara al soltar) · bloqueo: mantener pulsado
  const holdT = p.feintHoldT || 0;
  const feintTap = p.isCPU
    ? (inp.feint && !p.feintHeld)
    : (!inp.feint && p.feintHeld && holdT < 0.16);
  const guardHold = inp.guard || (inp.feint && holdT >= 0.16);
  p.feintHoldT = inp.feint ? holdT + dt : 0;

  // temporizador de estado
  if (p.stateTimer > 0 && p.state !== PSTATE.GUARD) {
    p.stateTimer -= dt;
    if (p.stateTimer <= 0) {
      switch (p.state) {
        case PSTATE.WINDUP: {
          p.state = PSTATE.ATTACK;
          p.stateTimer = 0.10;
          p.hitDone = false;
          sfxSlash();
          const cy = bodyCenterY(p);
          slashTrails.push({
            x1: p.x + p.facing * 14, y1: cy - 42,
            x2: p.x + p.facing * (p.reach + 14), y2: cy + 16,
            life: 0.22, maxLife: 0.22,
          });
          p.vx = p.facing * 200;
          break;
        }
        case PSTATE.ATTACK:
          p.state = PSTATE.RECOVER;
          p.stateTimer = p.recover;
          break;
        case PSTATE.FEINT:
          p.state = PSTATE.RECOVER;
          p.stateTimer = p.feintRec;
          resolveFeint(p, foe);
          break;
        case PSTATE.EXPOSED:
          p.state = PSTATE.IDLE;
          p.postura = p.posMax * 0.5;
          break;
        case PSTATE.RECOVER:
        case PSTATE.STAGGER:
        case PSTATE.HITSTUN:
          p.state = PSTATE.IDLE;
          break;
      }
    }
  }

  // guardia: se mantiene mientras se sostiene el botón
  if (p.state === PSTATE.GUARD) {
    p.guardT += dt;
    p.postura = Math.max(0, p.postura - dt * 2);   // mantener la guardia desgasta un poco
    if (!guardHold && p.guardT > 0.1) p.state = PSTATE.IDLE;
    if (p.postura <= 0) checkPostureBreak(p);
  }

  // movimiento
  if (p.state === PSTATE.IDLE && roundStartTimer <= 0) {
    let mv = 0;
    if (inp.left) mv -= 1;
    if (inp.right) mv += 1;
    let spd = p.speed;
    if (destino.id === 'furia') spd *= 1.2;
    p.vx = mv * spd;
    if (mv !== 0) p.facing = mv;
    if (mv === 0) p.facing = foe.x > p.x ? 1 : -1;
    if (inp.jump && !p.jumpHeld) doJump(p);
    if (inp.attack && !p.attackHeld) startAttack(p);
    else if (guardHold) startGuard(p);
    else if (feintTap) startFeint(p);
  } else if (p.state === PSTATE.RECOVER || p.state === PSTATE.STAGGER || p.state === PSTATE.HITSTUN) {
    p.vx *= Math.pow(0.001, dt);
  } else if (p.state === PSTATE.GUARD) {
    let mv = 0;
    if (inp.left) mv -= 1;
    if (inp.right) mv += 1;
    p.vx = mv * p.speed * 0.3;
  } else if (p.state === PSTATE.EXPOSED) {
    p.vx *= Math.pow(0.001, dt);
  }
  if (p.slideT > 0) { p.slideT -= dt; if (p.slideT <= 0 && p.state === PSTATE.IDLE) p.vx *= 0.3; }
  p.attackHeld = inp.attack;
  p.feintHeld = inp.feint;
  p.jumpHeld = inp.jump;

  // viento (destino o tejado)
  if (destino.id === 'viento' || stage.id === 'tejado') {
    p.x += windForce * dt;
  }

  // física
  let grav = 1500;
  if (!p.onGround || p.vy < 0) p.vy += grav * dt;
  p.x += p.vx * dt;
  p.y += p.vy * dt;
  if (p.y >= GROUND) {
    const wasAir = !p.onGround;
    p.y = GROUND; p.vy = 0; p.onGround = true; p.jumpsUsed = 0;
    // Sapo Ronin: rebota al aterrizar
    if (wasAir && p.char.bounce && p.state !== PSTATE.DEAD) {
      p.vy = p.jumpVel * 0.45;
      p.onGround = false;
      sfxJump();
    }
  } else p.onGround = false;

  // límites: en el puente se puede caer
  if (p.state !== PSTATE.DEAD) {
    if (stage.id === 'puente' && scene === 'fight') {
      if (p.x < W * 0.12 || p.x > W * 0.88) {
        if (p.onGround) { fallDeath(p); return; }
      }
      p.x = Math.max(20, Math.min(W - 20, p.x));
    } else {
      p.x = Math.max(30, Math.min(W - 30, p.x));
    }
  }

  // volcán: grietas calientes dañan
  if (stage.id === 'volcan' && p.onGround && p.state !== PSTATE.DEAD && scene === 'fight') {
    for (const c of cracks) {
      if (c.heat > 0.85 && Math.abs(p.x - c.x) < c.w / 2 && !p.burnCD) {
        p.burnCD = 0.8;
        p.vida = Math.max(1, p.vida - 10);
        p.vy = -300; p.onGround = false;
        sfxHit();
        floatText(p.x, bodyCenterY(p), '-10 ¡QUEMA!', '#ff8830', 15);
        spawnParticles(p.x, GROUND, 12, ['#ff9030', '#ffc050', '#d04010'], 220, 0.7);
      }
    }
  }
  if (p.burnCD > 0) p.burnCD -= dt;

  // regeneración de postura
  if (p.state === PSTATE.IDLE && p.postura < p.posMax) {
    p.postura = Math.min(p.posMax, p.postura + p.posRegen * dt);
  }

  // rastro eléctrico (rasgo trueno)
  if (p.rasgo && p.rasgo.id === 'trueno' && Math.abs(p.vx) > 60 && Math.random() < 0.3) {
    particles.push({
      x: p.x + (Math.random() - 0.5) * 20, y: p.y - Math.random() * 60 * p.scale,
      vx: (Math.random() - 0.5) * 80, vy: -40 - Math.random() * 60,
      life: 0.25, maxLife: 0.25, color: '#80d8ff', size: 2, gravity: false,
    });
  }

  // imágenes falsas del Espectro
  for (let i = p.afterimages.length - 1; i >= 0; i--) {
    p.afterimages[i].life -= dt;
    if (p.afterimages[i].life <= 0) p.afterimages.splice(i, 1);
  }

  if (p.state === PSTATE.DEAD) p.deathT += dt;
  p.bob += dt * 4;
}
// ============================================================
//  UPDATE PRINCIPAL
// ============================================================
let windForce = 0, windPhase = 0;

function update(dt) {
  gTime += dt;
  if (slowmoTimer > 0) {
    slowmoTimer -= dt;
    if (slowmoTimer <= 0) timeScale = 1;
  }
  let sdt = dt * timeScale;
  if (destino.id === 'furia' && scene === 'fight') sdt *= 1.25;

  if (shake > 0) shake = Math.max(0, shake - dt * 40);
  if (flashTimer > 0) flashTimer -= dt;
  if (destino.id === 'temblor' && scene === 'fight' && roundStartTimer <= 0) {
    shake = Math.max(shake, 2.5 + Math.sin(gTime * 7) * 1.5);
  }
  if (destino.id === 'oscuridad') darkPulse = (Math.sin(gTime * 3.1) + Math.sin(gTime * 7.7)) * 0.5;

  // viento
  windPhase += dt;
  const windy = destino.id === 'viento' || stage.id === 'tejado';
  windForce = windy ? Math.sin(windPhase * 0.5) * 90 + Math.sin(windPhase * 1.7) * 40 : 0;

  // ambiente: pétalos
  for (const pt of petals) {
    pt.sway += dt;
    pt.x -= (pt.speed + Math.max(0, -windForce)) * dt;
    pt.x += Math.max(0, windForce) * dt * 1.5;
    pt.y += Math.sin(pt.sway) * 12 * dt + 8 * dt;
    if (pt.x < -10) { pt.x = W + 10; pt.y = Math.random() * H * 0.7; }
    if (pt.x > W + 10) { pt.x = -10; pt.y = Math.random() * H * 0.7; }
    if (pt.y > H) pt.y = -10;
  }
  // lluvia
  if (destino.id === 'lluvia') {
    for (const r of rain) {
      r.y += r.s * dt; r.x -= 60 * dt;
      if (r.y > H) { r.y = -10; r.x = Math.random() * (W + 100); }
    }
  }

  // partículas
  for (let i = particles.length - 1; i >= 0; i--) {
    const pa = particles[i];
    pa.life -= sdt;
    if (pa.life <= 0) { particles.splice(i, 1); continue; }
    if (pa.gravity) pa.vy += 900 * sdt;
    pa.x += pa.vx * sdt;
    pa.y += pa.vy * sdt;
    if (pa.gravity && pa.y > GROUND + 6) { pa.y = GROUND + 6; pa.vy *= -0.3; pa.vx *= 0.6; }
  }
  for (let i = slashTrails.length - 1; i >= 0; i--) {
    slashTrails[i].life -= sdt;
    if (slashTrails[i].life <= 0) slashTrails.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.life -= dt; f.y -= 36 * dt;
    if (f.life <= 0) floaters.splice(i, 1);
  }

  if (scene === 'destino') {
    roundMsgTimer -= dt;
    if (roundMsgTimer <= 0) scene = 'apuesta';
    return;
  }
  if (scene === 'apuesta') {
    updateApuesta(dt);
    return;
  }
  if (!['fight', 'roundEnd', 'matchEnd'].includes(scene)) return;

  if (roundStartTimer > 0) roundStartTimer -= dt;

  if (scene === 'fight' || scene === 'roundEnd') {
    updatePlayer(p1, p2, true, sdt);
    updatePlayer(p2, p1, false, sdt);
    if (scene === 'fight' && roundStartTimer <= 0) {
      updateCombat();
      updateStageHazards(sdt);
      updateGhost(sdt);
    }
  }

  if (scene === 'roundEnd') {
    roundMsgTimer -= dt;
    if (roundMsgTimer <= 0) {
      if (matchWinner) finishMatch();
      else startRoundFlow();
    }
  }
}

// ---------------- Peligros del escenario ----------------
function updateStageHazards(dt) {
  // templo: campanas que distraen (pulso visual + sonido)
  if (stage.id === 'templo') {
    bellTimer -= dt;
    if (bellTimer <= 0) {
      bellTimer = 4 + Math.random() * 5;
      sfxBell();
      flashTimer = Math.max(flashTimer, 0.08);
      darkPulse = 0.5;
    }
  }
  // mercado: los espectadores lanzan objetos
  if (stage.id === 'mercado' && Math.random() < dt * 0.35) {
    const fromLeft = Math.random() < 0.5;
    projectiles.push({
      x: fromLeft ? -10 : W + 10,
      y: GROUND - 180 - Math.random() * 120,
      vx: (fromLeft ? 1 : -1) * (180 + Math.random() * 120),
      vy: -60 + Math.random() * 60,
      rot: 0, kind: Math.floor(Math.random() * 3),
    });
  }
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.vy += 600 * dt;
    pr.x += pr.vx * dt; pr.y += pr.vy * dt;
    pr.rot += dt * 8;
    if (pr.y > GROUND || pr.x < -30 || pr.x > W + 30) {
      if (pr.y > GROUND) spawnParticles(pr.x, GROUND, 6, ['#b09060', '#806040'], 120, 0.4);
      projectiles.splice(i, 1);
      continue;
    }
    for (const p of [p1, p2]) {
      if (p.state === PSTATE.DEAD || p.state === PSTATE.HITSTUN) continue;
      if (Math.abs(pr.x - p.x) < 18 && Math.abs(pr.y - bodyCenterY(p)) < 40 * p.scale) {
        p.state = PSTATE.HITSTUN;
        p.stateTimer = 0.3;
        p.vx = Math.sign(pr.vx) * 200;
        sfxBlock();
        floatText(p.x, bodyCenterY(p) - 40, '¡UF!', '#e8c050', 14);
        projectiles.splice(i, 1);
        break;
      }
    }
  }
  // volcán: las grietas laten
  if (stage.id === 'volcan') {
    for (const c of cracks) c.heat = (Math.sin(gTime * 1.3 + c.phase) + 1) / 2;
  }
}

// ---------------- Fantasmas del Pasado ----------------
function updateGhost(dt) {
  // graba a ambos; al final de la ronda solo se conserva el ganador
  if (ghostRec) {
    ghostRec.frames.push({
      x1: p1.x, y1: p1.y, f1: p1.facing, s1: p1.state,
      x2: p2.x, y2: p2.y, f2: p2.facing, s2: p2.state,
    });
    if (ghostRec.frames.length > 60 * 30) ghostRec.frames.shift();
  }
  if (ghostPlay) {
    ghostPlay.i++;
    if (ghostPlay.i >= ghostPlay.frames.length) ghostPlay = null;
  }
}

// al terminar la ronda decidimos qué lado del eco conservar
function snapshotGhostFor(winner) {
  if (!ghostRec) return;
  const isP1 = winner === p1;
  ghostRec.frames = ghostRec.frames.map(f => isP1
    ? { x: f.x1, y: f.y1, facing: f.f1, state: f.s1 }
    : { x: f.x2, y: f.y2, facing: f.f2, state: f.s2 });
  ghostRec.pal = winner.pal;
  ghostRec.scale = winner.scale;
}

// ---------------- Apuestas (elección secreta) ----------------
function updateApuesta(dt) {
  if (betReveal > 0) {
    betReveal -= dt;
    if (betReveal <= 0) resetRound();
    return;
  }
  // P1 con teclado o tap
  for (const code of keyPressQueue) {
    if (!betDone[0]) {
      if (code === 'KeyA' || code === 'ArrowLeft') { betSel[0] = (betSel[0] + 2) % 3; sfxSelect(); }
      if (code === 'KeyD' || code === 'ArrowRight') { betSel[0] = (betSel[0] + 1) % 3; sfxSelect(); }
      if (code === 'KeyF' || code === 'Enter' || code === 'Space') { betDone[0] = true; sfxConfirm(); }
    } else if (!vsCPU && !betDone[1]) {
      if (code === 'ArrowLeft') { betSel[1] = (betSel[1] + 2) % 3; sfxSelect(); }
      if (code === 'ArrowRight') { betSel[1] = (betSel[1] + 1) % 3; sfxSelect(); }
      if (code === 'KeyK' || code === 'Enter') { betDone[1] = true; sfxConfirm(); }
    }
  }
  keyPressQueue = [];
  for (const tp of tapQueue) {
    const idx = !betDone[0] ? 0 : (!vsCPU && !betDone[1] ? 1 : -1);
    if (idx < 0) break;
    for (let i = 0; i < 3; i++) {
      const bx = W / 2 + (i - 1) * 250;
      if (Math.abs(tp.x - bx) < 115 && Math.abs(tp.y - H * 0.52) < 90) {
        if (betSel[idx] === i) { betDone[idx] = true; sfxConfirm(); }
        else { betSel[idx] = i; sfxSelect(); }
      }
    }
  }
  tapQueue = [];
  if (betDone[0] && betDone[1]) betReveal = 1.4;
}

// ---------------- Fin del combate: puntaje y reputación ----------------
function computeScore(p, foe) {
  let s = 0;
  s += 1000;                                  // victoria
  s += p.stats.perfects * 500;                // rondas sin recibir daño
  s += p.stats.parries * 100;                 // bloqueos perfectos
  if (modoFinal) s += 800;                    // modo Golpe Final
  if (foe.wins === WIN_ROUNDS - 1) s += 400;  // remontada al límite
  s += save.streak * 150;                     // racha
  return s;
}

function applyReputation(p) {
  const st = p.stats;
  if (st.taken === 0 && st.feints <= 1) save.rep.honor++;
  if (st.feints >= 4) save.rep.astucia++;
  if (st.hits >= 4 || p.bet === 'agresivo') save.rep.ferocidad++;
  if (st.blocks + st.parries >= 3) save.rep.disciplina++;
}

function finishMatch() {
  scene = 'matchEnd';
  roundMsgTimer = 0;
  const winner = matchWinner;
  const loser = winner === p1 ? p2 : p1;
  if (!winner.isCPU) {
    save.totalWins++;
    save.streak++;
    save.bestStreak = Math.max(save.bestStreak, save.streak);
    applyReputation(winner);
    pendingScore = {
      score: computeScore(winner, loser),
      char: winner.char.name,
      racha: save.streak,
      titulo: currentTitle(),
    };
  } else {
    save.streak = 0;
    pendingScore = null;
  }
  persist();
}

function qualifiesRanking(score) {
  if (save.ranking.length < 10) return true;
  return score > save.ranking[save.ranking.length - 1].score;
}

function submitScore() {
  const firma = firmaChars.join('');
  save.lastFirma = firma;
  save.ranking.push({
    firma,
    score: pendingScore.score,
    char: pendingScore.char,
    fecha: new Date().toLocaleDateString('es'),
    racha: pendingScore.racha,
    titulo: pendingScore.titulo,
  });
  save.ranking.sort((a, b) => b.score - a.score);
  save.ranking = save.ranking.slice(0, 10);
  persist();
  pendingScore = null;
  scene = 'ranking';
}
// ============================================================
//  DIBUJO — ESCENARIOS
// ============================================================
function drawBackground() {
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  const skies = {
    dojo:    ['#0d0d1f', '#1c1430', '#3a1c2e', '#1a0e16'],
    puente:  ['#0a1422', '#142838', '#2a3848', '#101820'],
    bambu:   ['#0a140e', '#14241a', '#1e3424', '#0c160e'],
    tejado:  ['#1a1026', '#2a1838', '#48283e', '#1c1018'],
    templo:  ['#160e1e', '#241430', '#42203a', '#1a0e16'],
    mercado: ['#1e1410', '#32221a', '#4c3024', '#1e140e'],
    volcan:  ['#1c0a0a', '#301010', '#521a10', '#200c08'],
  };
  const cs = skies[stage.id] || skies.dojo;
  sky.addColorStop(0, cs[0]); sky.addColorStop(0.55, cs[1]);
  sky.addColorStop(0.8, cs[2]); sky.addColorStop(1, cs[3]);
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // luna
  ctx.save();
  ctx.fillStyle = stage.id === 'volcan' ? '#e8a060' : '#e8d8c0';
  ctx.shadowColor = ctx.fillStyle;
  ctx.shadowBlur = 50;
  ctx.beginPath();
  ctx.arc(W * 0.72, H * 0.24, 58, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // montañas
  ctx.fillStyle = 'rgba(10,8,18,0.8)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.72);
  ctx.lineTo(W * 0.18, H * 0.45); ctx.lineTo(W * 0.38, H * 0.68);
  ctx.lineTo(W * 0.55, H * 0.5);  ctx.lineTo(W * 0.8, H * 0.7);
  ctx.lineTo(W, H * 0.55); ctx.lineTo(W, H); ctx.lineTo(0, H);
  ctx.closePath(); ctx.fill();

  // elementos por escenario (detrás de los luchadores)
  if (stage.id === 'dojo') {
    ctx.strokeStyle = '#0c0a14'; ctx.lineWidth = 10;
    for (const bx of [40, 70, 905, 935]) {
      ctx.beginPath(); ctx.moveTo(bx, H);
      ctx.quadraticCurveTo(bx + (bx < W / 2 ? 18 : -18), H * 0.4, bx + (bx < W / 2 ? 30 : -30), 30);
      ctx.stroke();
    }
  } else if (stage.id === 'templo') {
    // pagoda y campana
    ctx.fillStyle = '#100a16';
    ctx.fillRect(W * 0.42, H * 0.36, W * 0.16, H * 0.36);
    for (let i = 0; i < 3; i++) {
      const y = H * 0.36 + i * H * 0.12;
      ctx.beginPath();
      ctx.moveTo(W * 0.38 - i * 8, y); ctx.lineTo(W * 0.62 + i * 8, y);
      ctx.lineTo(W * 0.58 + i * 8, y - 26); ctx.lineTo(W * 0.42 - i * 8, y - 26);
      ctx.closePath(); ctx.fill();
    }
    const sw = Math.sin(gTime * 2) * (bellTimer < 1 ? 8 : 2);
    ctx.fillStyle = '#6a5a2a';
    ctx.save();
    ctx.translate(W * 0.5, H * 0.3);
    ctx.rotate(sw * 0.03);
    ctx.beginPath(); ctx.moveTo(-14, 0); ctx.lineTo(14, 0); ctx.lineTo(10, -24); ctx.lineTo(-10, -24); ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (stage.id === 'mercado') {
    // puestos con toldos y siluetas de espectadores
    for (const [mx, mw, c] of [[60, 150, '#7a2a2a'], [W - 220, 160, '#2a5a7a']]) {
      ctx.fillStyle = '#1a120c';
      ctx.fillRect(mx, GROUND - 110, mw, 110);
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(mx - 12, GROUND - 110); ctx.lineTo(mx + mw + 12, GROUND - 110);
      ctx.lineTo(mx + mw - 4, GROUND - 140); ctx.lineTo(mx + 4, GROUND - 140);
      ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    for (let i = 0; i < 9; i++) {
      const sx = 40 + i * 30 + Math.sin(gTime * 2 + i) * 2;
      ctx.beginPath(); ctx.arc(sx, GROUND - 62 + Math.sin(gTime * 3 + i * 2) * 2, 9, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(sx - 7, GROUND - 56, 14, 24);
    }
  } else if (stage.id === 'tejado') {
    ctx.fillStyle = '#0e0a18';
    for (let i = 0; i < 4; i++) {
      const bx = i * W / 4 + 30, bh = 100 + (i * 53) % 120;
      ctx.fillRect(bx, H - bh - 140, 130, bh);
    }
  } else if (stage.id === 'volcan') {
    ctx.fillStyle = '#2a0e08';
    ctx.beginPath();
    ctx.moveTo(W * 0.1, H); ctx.lineTo(W * 0.45, H * 0.2); ctx.lineTo(W * 0.55, H * 0.2);
    ctx.lineTo(W * 0.9, H); ctx.closePath(); ctx.fill();
    ctx.fillStyle = `rgba(255,${100 + Math.sin(gTime * 3) * 40},40,0.7)`;
    ctx.fillRect(W * 0.46, H * 0.18, W * 0.08, 8);
    if (Math.random() < 0.1) {
      particles.push({
        x: W * (0.46 + Math.random() * 0.08), y: H * 0.2,
        vx: (Math.random() - 0.5) * 120, vy: -100 - Math.random() * 150,
        life: 1.2, maxLife: 1.2, color: '#ff8030', size: 3, gravity: true,
      });
    }
  }

  // suelo
  if (stage.id === 'puente') {
    // abismo + tablones
    ctx.fillStyle = '#05070c';
    ctx.fillRect(0, GROUND, W, H - GROUND);
    const gr = ctx.createLinearGradient(0, GROUND, 0, H);
    gr.addColorStop(0, '#3a2c1c'); gr.addColorStop(1, '#1c140c');
    ctx.fillStyle = gr;
    ctx.fillRect(W * 0.12, GROUND, W * 0.76, 26);
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.lineWidth = 2;
    for (let x = W * 0.12; x < W * 0.88; x += 34) {
      ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x, GROUND + 26); ctx.stroke();
    }
    // cuerdas
    ctx.strokeStyle = '#4a3a22'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(W * 0.12, GROUND - 40); ctx.quadraticCurveTo(W / 2, GROUND - 24, W * 0.88, GROUND - 40); ctx.stroke();
    for (let x = W * 0.14; x < W * 0.88; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, GROUND - 36); ctx.lineTo(x, GROUND); ctx.stroke();
    }
  } else {
    const grounds = {
      dojo: ['#241a20', '#0e080c'], bambu: ['#16241a', '#080e0a'],
      tejado: ['#262030', '#100c16'], templo: ['#221a26', '#0e0a10'],
      mercado: ['#2e2218', '#140e08'], volcan: ['#2a1410', '#140806'],
    };
    const gc = grounds[stage.id] || grounds.dojo;
    const gr = ctx.createLinearGradient(0, GROUND, 0, H);
    gr.addColorStop(0, gc[0]); gr.addColorStop(1, gc[1]);
    ctx.fillStyle = gr;
    ctx.fillRect(0, GROUND, W, H - GROUND);
    ctx.strokeStyle = 'rgba(230,200,170,0.18)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
    if (stage.id === 'tejado') {
      ctx.strokeStyle = 'rgba(120,100,140,0.3)';
      for (let x = 0; x < W; x += 48) {
        ctx.beginPath(); ctx.moveTo(x, GROUND); ctx.lineTo(x + 20, H); ctx.stroke();
      }
    }
  }

  // grietas del volcán
  if (stage.id === 'volcan') {
    for (const c of cracks) {
      const glow = c.heat;
      ctx.fillStyle = `rgba(255,${60 + glow * 120},20,${0.25 + glow * 0.7})`;
      ctx.beginPath();
      ctx.ellipse(c.x, GROUND + 4, c.w / 2, 5 + glow * 4, 0, 0, Math.PI * 2);
      ctx.fill();
      if (glow > 0.85 && Math.random() < 0.3) {
        particles.push({
          x: c.x + (Math.random() - 0.5) * c.w, y: GROUND,
          vx: (Math.random() - 0.5) * 60, vy: -80 - Math.random() * 120,
          life: 0.5, maxLife: 0.5, color: '#ff9030', size: 2.5, gravity: true,
        });
      }
    }
  }

  // pétalos
  for (const pt of petals) {
    ctx.fillStyle = stage.id === 'volcan' ? 'rgba(255,150,60,0.5)'
                  : stage.id === 'bambu' ? 'rgba(140,200,120,0.5)'
                  : 'rgba(220,140,160,0.5)';
    ctx.beginPath();
    ctx.ellipse(pt.x, pt.y, pt.size, pt.size * 0.5, pt.sway, 0, Math.PI * 2);
    ctx.fill();
  }
}

// bambú en primer plano (obstruye la vista)
function drawForeground() {
  if (stage.id !== 'bambu') return;
  ctx.save();
  for (const [bx, w, a] of [[150, 26, 0.92], [380, 32, 0.95], [620, 24, 0.9], [830, 30, 0.94]]) {
    const sway = Math.sin(gTime * 0.8 + bx) * 6;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#1e3a22';
    ctx.save();
    ctx.translate(bx + sway, 0);
    ctx.fillRect(-w / 2, 0, w, H);
    ctx.fillStyle = '#142a18';
    for (let y = 40; y < H; y += 70) ctx.fillRect(-w / 2, y, w, 6);
    ctx.restore();
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

// ============================================================
//  DIBUJO — SAMURÁI
// ============================================================
function drawKatana(gx, gy, a, glow) {
  const dx = Math.cos(a), dy = Math.sin(a);
  const px = dy, py = -dx;
  const hbx = gx - dx * 7, hby = gy - dy * 7;
  const tsx = gx + dx * 9, tsy = gy + dy * 9;
  const L = 64;
  const tipx = tsx + dx * L, tipy = tsy + dy * L;
  const mx = tsx + dx * L * 0.55 + px * 3.5;
  const my = tsy + dy * L * 0.55 + py * 3.5;
  ctx.strokeStyle = '#241a12';
  ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(hbx, hby); ctx.lineTo(tsx, tsy); ctx.stroke();
  ctx.fillStyle = '#a8862a';
  ctx.beginPath(); ctx.arc(tsx, tsy, 4, 0, Math.PI * 2); ctx.fill();
  if (glow) { ctx.shadowColor = '#fff'; ctx.shadowBlur = 14; }
  ctx.strokeStyle = '#cdd6e2';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(tsx, tsy); ctx.quadraticCurveTo(mx, my, tipx, tipy); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  ctx.moveTo(tsx + px * 1.3, tsy + py * 1.3);
  ctx.quadraticCurveTo(mx + px * 1.3, my + py * 1.3, tipx, tipy);
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawArm(sx, sy, hx, hy, sleeve, skin) {
  const dx = hx - sx, dy = hy - sy;
  const len = Math.hypot(dx, dy) || 1;
  const k = Math.max(1.5, (30 - len) * 0.55);
  const ex = sx + dx / 2 - dy / len * k;
  const ey = sy + dy / 2 + dx / len * k;
  ctx.strokeStyle = sleeve;
  ctx.lineWidth = 6.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.lineTo(hx, hy); ctx.stroke();
  ctx.fillStyle = skin;
  ctx.beginPath(); ctx.arc(hx, hy, 3.1, 0, Math.PI * 2); ctx.fill();
}

// cabezas especiales por personaje
function drawHead(p, hx, hy, dead) {
  const pal = p.pal, style = p.char.head;
  // cara base
  ctx.fillStyle = pal.skin;
  ctx.beginPath(); ctx.arc(hx, hy, 8, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath(); ctx.arc(hx - 2, hy + 1, 7, Math.PI * 0.5, Math.PI * 1.5); ctx.fill();

  if (style === 'gallina') {
    ctx.fillStyle = '#e03020';   // cresta
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath(); ctx.arc(hx + i * 3 - 1, hy - 9 + Math.abs(i), 3, 0, Math.PI * 2); ctx.fill();
    }
    ctx.fillStyle = '#f0a020';   // pico
    ctx.beginPath(); ctx.moveTo(hx + 7, hy - 1); ctx.lineTo(hx + 14, hy + 1); ctx.lineTo(hx + 7, hy + 3); ctx.closePath(); ctx.fill();
  } else if (style === 'sapo') {
    ctx.fillStyle = pal.skin;
    ctx.beginPath(); ctx.arc(hx - 3, hy - 7, 3.5, 0, Math.PI * 2); ctx.arc(hx + 4, hy - 7, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a2a10';
    ctx.beginPath(); ctx.arc(hx - 3, hy - 7, 1.5, 0, Math.PI * 2); ctx.arc(hx + 4, hy - 7, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#2a4a1a'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(hx + 1, hy + 3); ctx.lineTo(hx + 6, hy + 3); ctx.stroke();
    return;
  } else if (style === 'mapache') {
    ctx.fillStyle = '#28282e';   // antifaz
    ctx.fillRect(hx - 7, hy - 3.5, 15, 5);
    ctx.fillStyle = '#9a9aa4';   // orejas
    ctx.beginPath(); ctx.moveTo(hx - 7, hy - 5); ctx.lineTo(hx - 4, hy - 12); ctx.lineTo(hx - 1, hy - 6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(hx + 1, hy - 6); ctx.lineTo(hx + 4, hy - 12); ctx.lineTo(hx + 7, hy - 5); ctx.closePath(); ctx.fill();
  } else if (style === 'tiburon') {
    ctx.fillStyle = pal.hakama;  // aleta
    ctx.beginPath(); ctx.moveTo(hx - 2, hy - 7); ctx.lineTo(hx + 1, hy - 16); ctx.lineTo(hx + 5, hy - 7); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';      // dientes
    ctx.fillRect(hx + 3, hy + 2, 5, 1.6);
  } else if (style === 'abuela') {
    ctx.fillStyle = pal.hair;    // moño blanco
    ctx.beginPath(); ctx.arc(hx - 2, hy - 8, 5, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#7a6a76'; // gafas
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(hx + 4, hy - 1, 2.6, 0, Math.PI * 2); ctx.stroke();
  } else if (style === 'monja') {
    ctx.fillStyle = pal.kimono;  // capucha
    ctx.beginPath(); ctx.arc(hx - 1, hy - 1.5, 9, Math.PI * 0.6, Math.PI * 2.1); ctx.fill();
  } else if (style === 'viejo') {
    ctx.fillStyle = pal.hair;    // barba
    ctx.beginPath(); ctx.moveTo(hx + 2, hy + 4); ctx.lineTo(hx + 5, hy + 14); ctx.lineTo(hx - 2, hy + 6); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.arc(hx - 2, hy - 2, 8.3, Math.PI * 0.9, Math.PI * 1.9); ctx.fill();
  } else if (style === 'espectro') {
    ctx.fillStyle = 'rgba(128,232,224,0.8)';
    ctx.fillRect(hx + 2.5, hy - 2, 3, 2);   // ojo brillante
  } else {
    // pelo recogido por defecto
    ctx.fillStyle = pal.hair;
    ctx.beginPath();
    ctx.arc(hx - 1, hy - 1.5, 8.3, Math.PI * 0.85, Math.PI * 2.0);
    ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hx - 4, hy - 10, 4.5, 2.6, -0.5, 0, Math.PI * 2); ctx.fill();
  }
  // hachimaki
  ctx.strokeStyle = pal.accent;
  ctx.lineWidth = 3.5;
  ctx.beginPath(); ctx.moveTo(hx - 8.3, hy - 3); ctx.lineTo(hx + 8.3, hy - 3); ctx.stroke();
  const flut = Math.sin(p.bob * 2.3);
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(hx - 8, hy - 3);
  ctx.quadraticCurveTo(hx - 15, hy - 1 + flut, hx - 20, hy + 3 + flut * 2.5);
  ctx.stroke();
  // ojo
  if (!dead) {
    if (style !== 'espectro') {
      ctx.fillStyle = '#1a1208';
      ctx.fillRect(hx + 3, hy - 1.5, 2.6, 1.8);
    }
  } else {
    ctx.strokeStyle = '#1a1208'; ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(hx + 2.5, hy - 2.5); ctx.lineTo(hx + 6, hy + 0.5);
    ctx.moveTo(hx + 6, hy - 2.5); ctx.lineTo(hx + 2.5, hy + 0.5);
    ctx.stroke();
  }
}

function drawSamurai(p, ghostAlpha) {
  const f = p.facing, pal = p.pal;
  const dead = p.state === PSTATE.DEAD;
  const bob = p.onGround && !dead ? Math.sin(p.bob) * 1.5 : 0;
  const sc = p.scale || 1;

  if (ghostAlpha === undefined) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath();
    ctx.ellipse(p.x, p.y + 3, (dead ? 36 : 23) * sc, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    if (dead && p.onGround) {
      ctx.save();
      ctx.translate(p.x + f * 30, GROUND - 4);
      ctx.scale(f, 1);
      drawKatana(0, 0, -0.06, false);
      ctx.restore();
    }
  }

  ctx.save();
  if (ghostAlpha !== undefined) ctx.globalAlpha = ghostAlpha;
  ctx.translate(p.x, p.y + bob);
  if (dead) {
    const fall = Math.min(1, p.deathT * 2.8);
    ctx.rotate(-f * fall * 1.45);
    ctx.translate(0, fall * 5);
  }
  ctx.scale(f * sc, sc);
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';

  // pose según estado
  let grip = { x: 16, y: -46 + Math.sin(p.bob * 1.7) * 1.2 };
  let ang = -0.62;
  let footF = 12, footB = -11, lean = 0, headY = -66;
  switch (p.state) {
    case PSTATE.WINDUP: {
      const k = 1 - Math.max(0, p.stateTimer / (p.windup || 0.2));
      grip = { x: 3 - k * 5, y: -60 - k * 9 };
      ang = -1.85 - k * 0.55;
      lean = -3; footF = 10; footB = -14;
      break;
    }
    case PSTATE.FEINT: {
      const k = 1 - Math.max(0, p.stateTimer / (p.feintTime || 0.15));
      grip = { x: 3 - k * 3, y: -58 - k * 6 };
      ang = -1.7 - k * 0.4;
      lean = -2; footF = 10; footB = -13;
      break;
    }
    case PSTATE.ATTACK:
      grip = { x: 26, y: -46 }; ang = 0.12;
      lean = 7; footF = 25; footB = -19; headY = -63;
      break;
    case PSTATE.RECOVER:
      grip = { x: 20, y: -36 }; ang = 0.72;
      lean = 4; footF = 18; footB = -14;
      break;
    case PSTATE.GUARD:
      grip = { x: 12, y: -50 }; ang = -1.15;
      lean = -4; footF = 9; footB = -15; headY = -64;
      break;
    case PSTATE.STAGGER:
    case PSTATE.HITSTUN:
      grip = { x: 8, y: -38 }; ang = 0.9;
      lean = -8; footF = 7; footB = -17; headY = -64;
      break;
    case PSTATE.EXPOSED:
      grip = { x: 14, y: -26 }; ang = 1.25;
      lean = 6 + Math.sin(p.bob * 6) * 2; footF = 16; footB = -8; headY = -58;
      break;
    case PSTATE.DEAD:
      grip = null; footF = 13; footB = -12;
      break;
  }

  const hipY = -34, shoulderY = -56;

  // hakama
  ctx.fillStyle = pal.hakamaDark;
  ctx.beginPath();
  ctx.moveTo(-6, hipY); ctx.lineTo(3, hipY);
  ctx.lineTo(footB + 7, -2); ctx.lineTo(footB - 7, -2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = pal.hakama;
  ctx.beginPath();
  ctx.moveTo(-4, hipY); ctx.lineTo(7, hipY);
  ctx.lineTo(footF + 8, -2); ctx.lineTo(footF - 6, -2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#2a201a';
  ctx.beginPath(); ctx.ellipse(footF + 2, -2, 7, 2.8, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(footB - 1, -2, 6, 2.8, 0, 0, Math.PI * 2); ctx.fill();

  // torso
  ctx.fillStyle = pal.kimono;
  ctx.beginPath();
  ctx.moveTo(-8, hipY + 1); ctx.lineTo(8, hipY + 1);
  ctx.lineTo(lean + 9, shoulderY - 2); ctx.lineTo(lean - 9, shoulderY - 2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath();
  ctx.moveTo(-8, hipY + 1); ctx.lineTo(-2, hipY + 1);
  ctx.lineTo(lean - 3, shoulderY - 2); ctx.lineTo(lean - 9, shoulderY - 2);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = pal.kimonoDark;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(lean - 5, shoulderY - 1); ctx.lineTo(lean + 3, -44); ctx.lineTo(lean + 7, shoulderY + 1);
  ctx.stroke();
  ctx.fillStyle = pal.obi;
  ctx.fillRect(-8, hipY - 4, 16, 6);

  // cabeza
  const hx2 = lean + 3, hy2 = headY;
  ctx.strokeStyle = pal.skin;
  ctx.lineWidth = 5;
  ctx.beginPath(); ctx.moveTo(lean + 1, shoulderY - 1); ctx.lineTo(hx2, hy2 + 6); ctx.stroke();
  drawHead(p, hx2, hy2, dead);

  // brazos + katana
  if (grip) {
    const dxg = Math.cos(ang), dyg = Math.sin(ang);
    const farX = grip.x - dxg * 6, farY = grip.y - dyg * 6;
    drawArm(lean - 4, shoulderY + 3, farX, farY, pal.kimonoDark, pal.skin);
    drawKatana(grip.x, grip.y, ang, p.state === PSTATE.ATTACK || (p.state === PSTATE.GUARD && p.guardT <= p.parryWin));
    drawArm(lean + 5, shoulderY + 2, grip.x, grip.y, pal.kimono, pal.skin);
  } else {
    drawArm(lean - 4, shoulderY + 3, -10, -38, pal.kimonoDark, pal.skin);
    drawArm(lean + 5, shoulderY + 2, 12, -36, pal.kimono, pal.skin);
  }

  // aura de expuesto
  if (p.state === PSTATE.EXPOSED) {
    ctx.strokeStyle = `rgba(255,210,60,${0.5 + Math.sin(gTime * 12) * 0.4})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(0, -40, 36, 0, Math.PI * 2); ctx.stroke();
  }
  ctx.restore();

  // imágenes falsas del Espectro
  for (const ai of p.afterimages) {
    const fake = Object.assign({}, p, {
      x: ai.x, y: ai.y, facing: ai.facing, state: PSTATE.IDLE,
      bob: ai.bob, afterimages: [],
    });
    drawSamurai(fake, 0.35 * (ai.life / ai.maxLife));
  }
}

function drawGhost() {
  if (!ghostPlay || !ghostPlay.frames.length) return;
  const fr = ghostPlay.frames[Math.min(ghostPlay.i, ghostPlay.frames.length - 1)];
  if (!fr || fr.x === undefined) return;
  const fake = {
    x: fr.x, y: fr.y, facing: fr.facing, state: fr.state === PSTATE.DEAD ? PSTATE.IDLE : fr.state,
    pal: ghostPlay.pal || PALG, char: {}, scale: ghostPlay.scale || 1,
    bob: gTime * 4, onGround: true, deathT: 0, guardT: 1, parryWin: 0,
    windup: 0.2, feintTime: 0.15, afterimages: [], stateTimer: 0,
    rasgo: null,
  };
  drawSamurai(fake, 0.22 + Math.sin(gTime * 5) * 0.06);
}
const PALG = pal('#aab4c8', '#7a86a0', '#3a4258', '#282e40', '#9ad0e8', '#b8c4d8', '#dce4f0');
// ============================================================
//  HUD
// ============================================================
function drawBars() {
  const barW = 300, m = 22;
  for (const [p, x, align] of [[p1, m, 1], [p2, W - m - barW, -1]]) {
    // vida
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(x - 3, m - 3, barW + 6, 20);
    const vPct = Math.max(0, p.vida / VIDA_MAX);
    const grad = ctx.createLinearGradient(x, 0, x + barW, 0);
    grad.addColorStop(0, align === 1 ? '#c03434' : '#e8c050');
    grad.addColorStop(1, align === 1 ? '#e8c050' : '#4a80d8');
    ctx.fillStyle = grad;
    if (align === 1) ctx.fillRect(x, m, barW * vPct, 14);
    else ctx.fillRect(x + barW * (1 - vPct), m, barW * vPct, 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x - 3, m - 3, barW + 6, 20);
    // postura
    const pPct = Math.max(0, p.postura / p.posMax);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x - 3, m + 21, barW * 0.8 + 6, 11);
    ctx.fillStyle = p.state === PSTATE.EXPOSED ? '#ff4030'
      : pPct < 0.3 ? `rgba(255,${140 + Math.sin(gTime * 10) * 60},40,0.95)` : '#d8b450';
    const pw = barW * 0.8 * pPct;
    if (align === 1) ctx.fillRect(x, m + 23, pw, 7);
    else ctx.fillRect(x + barW * 0.2 + (barW * 0.8 - pw), m + 23, pw, 7);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x - 3, m + 21, barW * 0.8 + 6, 11);
    // nombre + personaje + apuesta
    ctx.fillStyle = '#e8e0d0';
    ctx.font = 'bold 12px "Courier New", monospace';
    ctx.textAlign = align === 1 ? 'left' : 'right';
    const bet = APUESTAS.find(b => b.id === p.bet);
    ctx.fillText(`${p.name} · ${p.char.name}${bet ? ' · ' + bet.kanji : ''}`, align === 1 ? x : x + barW, m + 46);
    if (p.rasgo) {
      ctx.fillStyle = '#9ad0e8';
      ctx.font = '10px "Courier New", monospace';
      ctx.fillText('★ ' + p.rasgo.name, align === 1 ? x : x + barW, m + 60);
    }
    // victorias
    for (let i = 0; i < WIN_ROUNDS; i++) {
      const cx = align === 1 ? x + barW - 40 + i * 18 : x + 40 - i * 18;
      ctx.beginPath();
      ctx.arc(cx, m + 46, 6, 0, Math.PI * 2);
      ctx.fillStyle = i < p.wins ? '#e8c050' : 'rgba(255,255,255,0.15)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
  // destino activo en el centro
  if (destino.id !== 'ninguno') {
    ctx.textAlign = 'center';
    ctx.font = 'bold 26px serif';
    ctx.fillStyle = 'rgba(232,192,80,0.9)';
    ctx.fillText(destino.kanji, W / 2, 40);
    ctx.font = '11px "Courier New", monospace';
    ctx.fillStyle = 'rgba(232,224,208,0.7)';
    ctx.fillText(destino.name, W / 2, 56);
  }
  ctx.textAlign = 'left';
}

function drawTouchControls() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const b of TBTN) {
    if (b.id === 'feint' && destino.id === 'honor') ctx.globalAlpha = 0.1;
    else ctx.globalAlpha = touchState[b.id] ? 0.6 : 0.25;
    ctx.fillStyle = touchState[b.id] ? '#e8c050' : '#ffffff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = touchState[b.id] ? 0.9 : 0.5;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = '#10101a';
    ctx.font = `bold ${Math.round(b.r * 0.72)}px sans-serif`;
    ctx.fillText(b.label, b.x, b.y + 2);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawCenterText(txt, size, y, color = '#e8e0d0', glow = '#b03030') {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${size}px "Courier New", monospace`;
  ctx.shadowColor = glow;
  ctx.shadowBlur = 24;
  ctx.fillStyle = color;
  ctx.fillText(txt, W / 2, y);
  ctx.restore();
}

// superposiciones según el destino
function drawDestinoOverlay() {
  if (destino.id === 'niebla') {
    for (let i = 0; i < 3; i++) {
      const fx = (gTime * (12 + i * 7)) % (W + 400) - 200;
      const fg = ctx.createRadialGradient(fx, H * 0.6, 30, fx, H * 0.6, 320);
      fg.addColorStop(0, 'rgba(190,195,205,0.5)');
      fg.addColorStop(1, 'rgba(190,195,205,0)');
      ctx.fillStyle = fg;
      ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = 'rgba(170,178,190,0.28)';
    ctx.fillRect(0, 0, W, H);
  }
  if (destino.id === 'lluvia') {
    ctx.strokeStyle = 'rgba(160,190,230,0.4)';
    ctx.lineWidth = 1.3;
    ctx.beginPath();
    for (const r of rain) {
      ctx.moveTo(r.x, r.y);
      ctx.lineTo(r.x - 4, r.y + 16);
    }
    ctx.stroke();
  }
  if (destino.id === 'oscuridad') {
    const dark = 0.45 + Math.max(0, darkPulse) * 0.5;
    ctx.fillStyle = `rgba(0,0,0,${Math.min(0.92, dark)})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (destino.id === 'sangre') {
    ctx.fillStyle = `rgba(140,10,10,${0.10 + Math.sin(gTime * 2) * 0.04})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (destino.id === 'viento' || stage.id === 'tejado') {
    ctx.strokeStyle = 'rgba(200,210,230,0.18)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const y = 60 + i * 90 + Math.sin(gTime * 2 + i) * 18;
      const x0 = ((gTime * 300 * Math.sign(windForce || 1) + i * 250) % (W + 200)) - 100;
      ctx.moveTo(x0, y);
      ctx.quadraticCurveTo(x0 + 50, y - 8, x0 + 110, y);
    }
    ctx.stroke();
  }
}

function drawFight(t) {
  drawBackground();
  drawGhost();

  // estelas de corte
  for (const s of slashTrails) {
    const a = s.life / s.maxLife;
    ctx.save();
    ctx.strokeStyle = `rgba(255,255,255,${a * 0.9})`;
    ctx.lineWidth = 3 + a * 5;
    ctx.lineCap = 'round';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = 16 * a;
    ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
    ctx.restore();
  }

  drawSamurai(p1);
  drawSamurai(p2);

  // objetos del mercado
  for (const pr of projectiles) {
    ctx.save();
    ctx.translate(pr.x, pr.y);
    ctx.rotate(pr.rot);
    if (pr.kind === 0) { ctx.fillStyle = '#c04030'; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI * 2); ctx.fill(); }
    else if (pr.kind === 1) { ctx.fillStyle = '#b09050'; ctx.fillRect(-8, -4, 16, 8); }
    else { ctx.fillStyle = '#80a040'; ctx.beginPath(); ctx.ellipse(0, 0, 9, 5, 0, 0, Math.PI * 2); ctx.fill(); }
    ctx.restore();
  }

  // partículas
  for (const pa of particles) {
    ctx.globalAlpha = Math.max(0, pa.life / pa.maxLife);
    ctx.fillStyle = pa.color;
    ctx.fillRect(pa.x - pa.size / 2, pa.y - pa.size / 2, pa.size, pa.size);
  }
  ctx.globalAlpha = 1;

  drawForeground();
  drawDestinoOverlay();

  // textos flotantes
  ctx.textAlign = 'center';
  for (const fl of floaters) {
    ctx.globalAlpha = Math.max(0, fl.life / fl.maxLife);
    ctx.font = `bold ${fl.size}px "Courier New", monospace`;
    ctx.fillStyle = fl.color;
    ctx.fillText(fl.txt, fl.x, fl.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';

  drawBars();

  if (roundStartTimer > 0 && scene === 'fight') {
    if (roundStartTimer > 0.7) {
      drawCenterText(`RONDA ${roundNum}`, 40, H * 0.4);
      drawCenterText(stage.name + ' · ' + destino.name, 16, H * 0.48, '#c0b8a8', 'transparent');
    } else {
      drawCenterText('¡CORTEN!', 56, H * 0.44, '#e8c050');
    }
  }

  if (scene === 'roundEnd' && roundMsg) {
    drawCenterText(roundMsg, 54, H * 0.42, '#fff', '#b03030');
    drawCenterText(roundMsgSub, 20, H * 0.5, '#e8c050', 'transparent');
  }

  if (TOUCH && (scene === 'fight' || scene === 'roundEnd')) drawTouchControls();

  // destello (parry / ejecución / instinto)
  if (flashTimer > 0) {
    ctx.fillStyle = `rgba(255,255,255,${Math.min(0.7, flashTimer * 4)})`;
    ctx.fillRect(0, 0, W, H);
  }

  // viñeta
  const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.45, W / 2, H / 2, H * 0.95);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.5)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

//  MENÚS — LÓGICA
// ============================================================
const TITLE_OPTS = [
  { id: 'cpu1',  label: '1 JUGADOR · DUELO CLÁSICO' },
  { id: 'vs2',   label: '2 JUGADORES · DUELO CLÁSICO' },
  { id: 'final', label: 'GOLPE FINAL · un corte decide' },
  { id: 'rank',  label: 'TABLA DE RÉCORDS' },
];

function pickVirtudes() {
  const pool = VIRTUDES.slice();
  virtudOpts = [];
  for (let i = 0; i < 3; i++) {
    virtudOpts.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  virtudSel = 0;
}

function titleChoose(i) {
  const id = TITLE_OPTS[i].id;
  sfxConfirm();
  if (id === 'rank') { scene = 'ranking'; return; }
  vsCPU = id !== 'vs2';
  modoFinal = id === 'final';
  selP = 0;
  selIdx = [0, Math.floor(Math.random() * CHARS.length)];
  scene = 'charSelect';
}

function charConfirm() {
  const c = allChars()[selIdx[selP]];
  if (!charUnlocked(c)) { sfxSelect(); return; }
  sfxConfirm();
  if (selP === 0 && !vsCPU) { selP = 1; selIdx[1] = 0; return; }
  if (vsCPU) {
    const opts = allChars().map((cc, i) => i).filter(i => i !== selIdx[0]);
    selIdx[1] = opts[Math.floor(Math.random() * opts.length)];
  }
  pickVirtudes();
  scene = 'virtud';
}

function handleMenus() {
  const cols = 5;
  const n = allChars().length;
  for (const code of keyPressQueue) {
    if (scene === 'title') {
      if (code === 'KeyW' || code === 'ArrowUp')   { menuSel = (menuSel + TITLE_OPTS.length - 1) % TITLE_OPTS.length; sfxSelect(); }
      if (code === 'KeyS' || code === 'ArrowDown') { menuSel = (menuSel + 1) % TITLE_OPTS.length; sfxSelect(); }
      if (code === 'Enter' || code === 'Space') titleChoose(menuSel);
    } else if (scene === 'charSelect') {
      let i = selIdx[selP];
      if (code === 'KeyA' || code === 'ArrowLeft')  { i = (i + n - 1) % n; sfxSelect(); }
      if (code === 'KeyD' || code === 'ArrowRight') { i = (i + 1) % n; sfxSelect(); }
      if (code === 'KeyW' || code === 'ArrowUp')    { i = (i + n - cols) % n; sfxSelect(); }
      if (code === 'KeyS' || code === 'ArrowDown')  { i = (i + cols) % n; sfxSelect(); }
      selIdx[selP] = i;
      if (code === 'Enter' || code === 'Space' || code === 'KeyF' || (selP === 1 && code === 'KeyK')) charConfirm();
      if (code === 'Escape') scene = 'title';
    } else if (scene === 'virtud') {
      if (code === 'KeyA' || code === 'ArrowLeft')  { virtudSel = (virtudSel + 2) % 3; sfxSelect(); }
      if (code === 'KeyD' || code === 'ArrowRight') { virtudSel = (virtudSel + 1) % 3; sfxSelect(); }
      if (code === 'Enter' || code === 'Space' || code === 'KeyF') { sfxConfirm(); startMatch(); }
    } else if (scene === 'matchEnd') {
      if (code === 'Enter' || code === 'Space') advanceMatchEnd();
    } else if (scene === 'firma') {
      if (code === 'KeyA' || code === 'ArrowLeft')  { firmaPos = (firmaPos + 2) % 3; sfxSelect(); }
      if (code === 'KeyD' || code === 'ArrowRight') { firmaPos = (firmaPos + 1) % 3; sfxSelect(); }
      if (code === 'KeyW' || code === 'ArrowUp')    { firmaChars[firmaPos] = cycleChar(firmaChars[firmaPos], 1); sfxSelect(); }
      if (code === 'KeyS' || code === 'ArrowDown')  { firmaChars[firmaPos] = cycleChar(firmaChars[firmaPos], -1); sfxSelect(); }
      if (code === 'Enter' || code === 'Space') { sfxConfirm(); submitScore(); }
      if (/^Key[A-Z]$/.test(code)) { firmaChars[firmaPos] = code[3]; firmaPos = Math.min(2, firmaPos + 1); sfxSelect(); }
    } else if (scene === 'ranking') {
      if (code === 'Enter' || code === 'Space' || code === 'Escape') { sfxConfirm(); scene = 'title'; }
    }
  }
  for (const tp of tapQueue) {
    if (scene === 'title') {
      for (let i = 0; i < TITLE_OPTS.length; i++) {
        if (Math.abs(tp.y - (H * 0.52 + i * 42)) < 20) {
          if (menuSel === i) titleChoose(i);
          else { menuSel = i; sfxSelect(); }
        }
      }
    } else if (scene === 'charSelect') {
      for (let i = 0; i < n; i++) {
        const cx = W / 2 + (i % cols - 2) * 150;
        const cy = 120 + Math.floor(i / cols) * 92;
        if (Math.abs(tp.x - cx) < 72 && Math.abs(tp.y - cy) < 42) {
          if (selIdx[selP] === i) charConfirm();
          else { selIdx[selP] = i; sfxSelect(); }
        }
      }
      if (tp.y > H - 60 && tp.x > W - 180) charConfirm();
    } else if (scene === 'virtud') {
      for (let i = 0; i < 3; i++) {
        const bx = W / 2 + (i - 1) * 260;
        if (Math.abs(tp.x - bx) < 120 && Math.abs(tp.y - H * 0.5) < 100) {
          if (virtudSel === i) { sfxConfirm(); startMatch(); }
          else { virtudSel = i; sfxSelect(); }
        }
      }
    } else if (scene === 'matchEnd') {
      advanceMatchEnd();
    } else if (scene === 'firma') {
      for (let i = 0; i < 3; i++) {
        const lx = W / 2 + (i - 1) * 80;
        if (Math.abs(tp.x - lx) < 35) {
          if (tp.y > H * 0.34 && tp.y < H * 0.46) { firmaPos = i; firmaChars[i] = cycleChar(firmaChars[i], 1); sfxSelect(); }
          if (tp.y > H * 0.52 && tp.y < H * 0.62) { firmaPos = i; firmaChars[i] = cycleChar(firmaChars[i], -1); sfxSelect(); }
        }
      }
      if (Math.abs(tp.x - W / 2) < 110 && Math.abs(tp.y - H * 0.74) < 26) { sfxConfirm(); submitScore(); }
    } else if (scene === 'ranking') {
      sfxConfirm(); scene = 'title';
    }
  }
}

const FIRMA_ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
function cycleChar(c, d) {
  const i = FIRMA_ALPHA.indexOf(c);
  return FIRMA_ALPHA[(i + d + FIRMA_ALPHA.length) % FIRMA_ALPHA.length];
}

function advanceMatchEnd() {
  sfxConfirm();
  if (pendingScore && qualifiesRanking(pendingScore.score)) {
    firmaChars = save.lastFirma.split('').slice(0, 3);
    while (firmaChars.length < 3) firmaChars.push('A');
    firmaPos = 0;
    scene = 'firma';
  } else {
    pendingScore = null;
    scene = 'ranking';
  }
}

    ctx.font = (top ? 'bold 15px' : '13px') + ' "Courier New", monospace';
    ctx.fillStyle = top ? '#e8c050' : i < 3 ? '#d8c8a0' : '#b0a890';
    const row = `${String(i + 1).padStart(2)}  ${r.firma.padEnd(5)} ${String(r.score).padStart(8)}   ${r.char.padEnd(18).slice(0, 18)} ${String(r.racha).padStart(4)}   ${r.fecha.padEnd(10)}  ${r.titulo || ''}`;
    ctx.fillText(row, W / 2, y);
  }
  ctx.textAlign = 'left';
  drawCenterText(`reputación — honor ${save.rep.honor} · astucia ${save.rep.astucia} · ferocidad ${save.rep.ferocidad} · disciplina ${save.rep.disciplina}`, 13, H - 50, '#998', 'transparent');
  if (Math.sin(t * 4) > -0.3) {
    drawCenterText(TOUCH ? 'toca para volver' : 'ENTER para volver', 14, H - 22, '#c0b8a8', 'transparent');
  }
}

// ============================================================
//  DIBUJO PRINCIPAL Y BUCLE
// ============================================================
function draw(t) {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);

  switch (scene) {
    case 'title':      drawTitle(t); break;
    case 'charSelect': drawCharSelect(t); break;
    case 'virtud':     drawVirtud(t); break;
    case 'destino':    drawDestinoScene(t); break;
    case 'apuesta':    drawApuesta(t); break;
    case 'firma':      drawFirma(t); break;
    case 'ranking':    drawRanking(t); break;
    case 'fight':
    case 'roundEnd':
      drawFight(t);
      break;
    case 'matchEnd':
      drawFight(t);
      drawMatchEnd(t);
      break;
  }
  ctx.restore();
}

function loop(ts) {
  const t = ts / 1000;
  let dt = Math.min(0.033, t - lastTime || 0.016);
  lastTime = t;
  handleMenus();
  update(dt);
  draw(t);
  keyPressQueue.length = 0;
  tapQueue.length = 0;
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
