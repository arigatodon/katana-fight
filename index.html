<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>KATANA FIGHT — Duelo de Samuráis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a12;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #wrap { position: relative; }
  /* nombre del guerrero (modo online): input real para que el
     teclado del sistema funcione también en el móvil */
  #nameInput {
    display: none;
    position: absolute;
    left: 50%; top: 46%;
    transform: translate(-50%, -50%);
    width: 56%;
    max-width: 420px;
    padding: 12px 16px;
    background: rgba(10, 10, 18, 0.92);
    border: 2px solid #e8c050;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 26px;
    font-weight: bold;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 3px;
    outline: none;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    image-rendering: pixelated;
    box-shadow: 0 0 60px rgba(180, 40, 40, .25);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #rotate {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #0a0a12;
    color: #e8e0d0;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 22px;
    line-height: 1.8;
  }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate { display: flex; }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas><input id="nameInput" maxlength="12" autocomplete="off" spellcheck="false" placeholder="TU NOMBRE"></div>
<div id="rotate">📱⟳<br>Gira tu teléfono<br><span style="font-size:15px;color:#998">el duelo se juega en horizontal</span></div>

<!-- KATANA FIGHT — el orden de carga importa (scripts clásicos, sin módulos) -->
<script src="js/core.js"></script>     <!-- canvas, constantes, guardado, estado global -->
<script src="js/audio.js"></script>    <!-- sonido sintetizado -->
<script src="js/data.js"></script>     <!-- personajes, destinos, virtudes, apuestas, escenarios -->
<script src="js/fx.js"></script>       <!-- partículas, estelas, textos flotantes, ambiente -->
<script src="js/input.js"></script>    <!-- teclado y controles táctiles -->
<script src="js/net.js"></script>      <!-- emparejamiento online y lockstep -->
<script src="js/player.js"></script>   <!-- creación de jugadores y estadísticas derivadas -->
<script src="js/combat.js"></script>   <!-- golpes, fintas, bloqueo, parry, postura, muerte -->
<script src="js/ai.js"></script>       <!-- inteligencia de la CPU -->
<script src="js/flow.js"></script>     <!-- torneo arcade, rondas, apuestas, puntaje, ranking -->
<script src="js/update.js"></script>   <!-- física, bucle de actualización, peligros de escenario -->
<script src="js/render.js"></script>   <!-- dibujo del combate, samuráis, escenarios, HUD -->
<script src="js/ui.js"></script>       <!-- menús: título, virtudes, apuestas, firma, récords -->
<script src="js/main.js"></script>     <!-- bucle principal -->
</body>
</html>
