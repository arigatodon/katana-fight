<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #0a0a12;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #wrap { position: relative; }
  /* nombre del guerrero (modo online): input real para que el
     teclado del sistema funcione también en el móvil */
  #nameInput {
    display: none;
    position: absolute;
    left: 50%; top: 46%;
    transform: translate(-50%, -50%);
    width: 56%;
    max-width: 420px;
    padding: 12px 16px;
    background: rgba(10, 10, 18, 0.92);
    border: 2px solid #e8c050;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 26px;
    font-weight: bold;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 3px;
    outline: none;
  }
  /* comentario / sugerencia al terminar un torneo */
  #commentInput {
    display: none;
    position: absolute;
    left: 50%; top: 42%;
    transform: translate(-50%, -50%);
    width: 64%;
    max-width: 520px;
    height: 110px;
    padding: 10px 14px;
    background: rgba(10, 10, 18, 0.92);
    border: 2px solid #e8c050;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    resize: none;
    outline: none;
  }
  canvas {
    display: block;
    /* escala al MÁXIMO que quepa en la ventana manteniendo 16:9 (deja 30px
       para el footer). Antes solo se limitaba con max-*, así que en monitores
       grandes se quedaba a 960x540 (pequeño). */
    width: min(100vw, calc((100vh - 30px) * 16 / 9));
    height: min(calc(100vh - 30px), calc(100vw * 9 / 16));
    image-rendering: pixelated;
    box-shadow: 0 0 60px rgba(180, 40, 40, .25);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  #rotate {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
    background: #0a0a12;
    color: #e8e0d0;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 22px;
    line-height: 1.8;
  }
  @media (orientation: portrait) and (pointer: coarse) {
    #rotate { display: flex; }
  }
  #footer {
    position: fixed;
    bottom: 5px; left: 0; right: 0;
    text-align: center;
    font-size: 13px;
    color: #776;
    z-index: 5;
  }
  #footer a { color: #9ad0e8; text-decoration: none; }
  #footer a:hover { color: #e8c050; }
  #footer .dona { color: #e89a9a; }
  /* móvil: el footer estorbaría a los botones táctiles;
     los mismos enlaces están en las esquinas de la pantalla de título */
  @media (pointer: coarse) {
    #footer { display: none; }
    /* en móvil no hay footer: usa toda la altura */
    canvas { width: min(100vw, calc(100vh * 16 / 9)); height: min(100vh, calc(100vw * 9 / 16)); }
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game" width="960" height="540"></canvas><input id="nameInput" maxlength="12" autocomplete="off" spellcheck="false" placeholder="TU NOMBRE"><textarea id="commentInput" maxlength="280" spellcheck="false" placeholder="tu comentario o sugerencia…"></textarea></div>
<div id="rotate">📱⟳<br>Gira tu teléfono<br><span style="font-size:15px;color:#998">el duelo se juega en horizontal</span></div>
<div id="footer">

  &nbsp;·&nbsp;
  <a href="/comentarios" target="_blank" rel="noopener">comentarios</a>
</div>

</body>
</html>
